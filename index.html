<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聆风的家 - 风崽的状态</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        #game-container {
            border: 4px solid #e94560;
            image-rendering: pixelated;
        }
        #status-text {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #eee;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 4px;
            max-width: 90%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="status-text">连接中...</div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            pixelArt: true,
            scene: { preload: preload, create: create, update: update }
        };

        // 区域坐标（根据房间图）
        const AREAS = {
            study: { x: 180, y: 280, name: '书房', desc: '帮聆风工作' },
            livingroom: { x: 280, y: 480, name: '客厅', desc: '待命中等吩咐' },
            kitchen: { x: 580, y: 280, name: '厨房', desc: '准备定时任务' },
            balcony: { x: 650, y: 480, name: '阳台', desc: '学习中' }
        };

        const BUBBLE_TEXTS = {
            study: ['帮聆风整理资料', '写代码中', '这个要记下来', '马上搞定'],
            livingroom: ['等聆风吩咐', '随时待命', '休息一下', '准备就绪'],
            kitchen: ['生成日报中', '抓取GitHub项目', '准备工作汇报', '定时任务中'],
            balcony: ['读文章学习中', '研究新技能', '优化系统', '充电中']
        };

        let game, avatar, statusText;
        let currentArea = 'livingroom';
        let targetX = 280, targetY = 480;
        let bubble = null, lastBubble = 0;
        let currentTask = '待命中';

        function preload() {
            this.load.image('home_bg', 'home_bg.jpg');
            this.load.image('avatar', 'avatar.png');
        }

        function create() {
            game = this;
            
            // 添加背景
            this.add.image(400, 300, 'home_bg');
            
            // 创建风崽角色
            avatar = this.add.sprite(280, 480, 'avatar');
            avatar.setOrigin(0.5);
            avatar.setScale(0.4);
            
            // 牌匾
            const plaqueBg = this.add.rectangle(400, 570, 300, 36, 0x5d4037);
            plaqueBg.setStrokeStyle(3, 0x3e2723);
            this.add.text(400, 570, '聆风的家', {
                font: '18px monospace',
                fill: '#ffd700',
                fontWeight: 'bold'
            }).setOrigin(0.5);
            
            // 区域标签
            Object.entries(AREAS).forEach(([key, area]) => {
                this.add.text(area.x, area.y - 40, area.name, {
                    font: '12px monospace',
                    fill: '#fff',
                    backgroundColor: '#000',
                    padding: { x: 4, y: 2 }
                }).setOrigin(0.5).setAlpha(0.7);
            });
            
            statusText = document.getElementById('status-text');
            
            // 开始获取状态
            fetchStatus();
            setInterval(fetchStatus, 3000); // 每3秒更新一次
        }

        function update(time) {
            // 移动
            const dx = targetX - avatar.x;
            const dy = targetY - avatar.y;
            const speed = 2;
            
            if (Math.abs(dx) > 2) avatar.x += Math.sign(dx) * speed;
            if (Math.abs(dy) > 2) avatar.y += Math.sign(dy) * speed;
            
            // 走动时的轻微摆动
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                avatar.y += Math.sin(time / 100) * 0.3;
            }
            
            // 每 5 秒冒气泡
            if (time - lastBubble > 5000) {
                showBubble();
                lastBubble = time;
            }
        }

        function fetchStatus() {
            // 模拟状态获取（实际应该连接后端API）
            // 这里根据时间模拟不同状态
            const hour = new Date().getHours();
            const minute = new Date().getMinutes();
            
            let newArea = currentArea;
            let newTask = currentTask;
            
            // 定时任务时间
            if ((hour === 7 || hour === 8) && minute < 30) {
                newArea = 'kitchen';
                newTask = '生成AI日报';
            } else if (hour === 10 && minute < 30) {
                newArea = 'kitchen';
                newTask = '抓取GitHub项目';
            } else if ((hour === 12 || hour === 18) && minute < 30) {
                newArea = 'kitchen';
                newTask = '准备工作汇报';
            } else if (hour >= 9 && hour <= 18) {
                // 工作时间默认在书房（模拟执行任务）
                newArea = 'study';
                newTask = '帮聆风工作';
            } else {
                // 其他时间在客厅待命
                newArea = 'livingroom';
                newTask = '待命中等吩咐';
            }
            
            // 更新状态
            if (newArea !== currentArea) {
                currentArea = newArea;
                currentTask = newTask;
                const area = AREAS[currentArea];
                targetX = area.x + (Math.random() - 0.5) * 40;
                targetY = area.y + (Math.random() - 0.5) * 40;
                updateStatusText();
            }
        }

        function updateStatusText() {
            const area = AREAS[currentArea];
            statusText.textContent = `风崽在${area.name} - ${currentTask}`;
        }

        function showBubble() {
            if (bubble) { bubble.destroy(); bubble = null; }
            
            const texts = BUBBLE_TEXTS[currentArea] || BUBBLE_TEXTS.livingroom;
            const text = texts[Math.floor(Math.random() * texts.length)];
            
            const bg = game.add.rectangle(avatar.x, avatar.y - 50, text.length * 12 + 16, 26, 0xffffff, 0.95);
            bg.setStrokeStyle(2, 0x000000);
            
            const txt = game.add.text(avatar.x, avatar.y - 50, text, {
                font: '12px monospace',
                fill: '#000'
            }).setOrigin(0.5);
            
            bubble = game.add.container(0, 0, [bg, txt]);
            bubble.setDepth(100);
            
            setTimeout(() => {
                if (bubble) { bubble.destroy(); bubble = null; }
            }, 3000);
        }

        new Phaser.Game(config);
    </script>
</body>
</html>
