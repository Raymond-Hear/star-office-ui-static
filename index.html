<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聆风的家 - 风崽的状态</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2d3748;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #e94560;
        }
        #home-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #avatar {
            position: absolute;
            width: 60px;
            height: 60px;
            transition: all 0.5s ease;
        }
        #status-bar {
            margin-top: 20px;
            color: #eee;
            font-size: 16px;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 8px;
        }
        .area-label {
            position: absolute;
            color: #fff;
            font-size: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 8px;
            border-radius: 4px;
        }
        #bubble {
            position: absolute;
            background: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            border: 2px solid #333;
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <img id="home-bg' src="home_bg.jpg" alt="聆风的家">
        
        <!-- 区域标签 -->
        <div class="area-label" style="left: 150px; top: 240px;">书房</div>
        <div class="area-label" style="left: 250px; top: 440px;">客厅</div>
        <div class="area-label" style="left: 550px; top: 240px;">厨房</div>
        <div class="area-label" style="left: 620px; top: 440px;">阳台</div>
        
        <!-- 风崽 -->
        <img id="avatar" src="avatar.png" alt="风崽">
        
        <!-- 气泡 -->
        <div id="bubble"></div>
    </div>
    
    <div id="status-bar">风崽准备就绪</div>

    <script>
        // 区域坐标
        const AREAS = {
            study: { x: 150, y: 250, name: '书房', task: '帮聆风工作' },
            livingroom: { x: 250, y: 450, name: '客厅', task: '待命中' },
            kitchen: { x: 550, y: 250, name: '厨房', task: '准备定时任务' },
            balcony: { x: 620, y: 450, name: '阳台', task: '学习中' }
        };

        const BUBBLE_TEXTS = {
            study: ['帮聆风整理资料', '写代码中', '马上搞定'],
            livingroom: ['等聆风吩咐', '随时待命', '休息中'],
            kitchen: ['生成日报中', '抓取GitHub项目', '定时任务中'],
            balcony: ['读文章学习', '研究新技能', '充电中']
        };

        const avatar = document.getElementById('avatar');
        const statusBar = document.getElementById('status-bar');
        const bubble = document.getElementById('bubble');

        let currentArea = 'livingroom';
        let targetX = 250, targetY = 450;

        // 根据时间决定位置
        function updateStatus() {
            const hour = new Date().getHours();
            const minute = new Date().getMinutes();
            
            let newArea = 'livingroom';
            
            // 定时任务时间
            if ((hour === 7 || hour === 8) && minute < 30) {
                newArea = 'kitchen';
            } else if (hour === 10 && minute < 30) {
                newArea = 'kitchen';
            } else if ((hour === 12 || hour === 18) && minute < 30) {
                newArea = 'kitchen';
            } else if (hour >= 9 && hour <= 18) {
                newArea = 'study';
            } else {
                newArea = 'livingroom';
            }
            
            if (newArea !== currentArea) {
                currentArea = newArea;
                const area = AREAS[currentArea];
                targetX = area.x + (Math.random() - 0.5) * 40;
                targetY = area.y + (Math.random() - 0.5) * 30;
                
                avatar.style.left = targetX + 'px';
                avatar.style.top = targetY + 'px';
                statusBar.textContent = `风崽在${area.name} - ${area.task}`;
                
                // 显示气泡
                showBubble();
            }
        }

        function showBubble() {
            const texts = BUBBLE_TEXTS[currentArea];
            const text = texts[Math.floor(Math.random() * texts.length)];
            bubble.textContent = text;
            bubble.style.left = (targetX + 10) + 'px';
            bubble.style.top = (targetY - 40) + 'px';
            bubble.style.display = 'block';
            
            setTimeout(() => {
                bubble.style.display = 'none';
            }, 3000);
        }

        // 初始化位置
        const area = AREAS[currentArea];
        avatar.style.left = area.x + 'px';
        avatar.style.top = area.y + 'px';
        statusBar.textContent = `风崽在${area.name} - ${area.task}`;

        // 每5秒更新一次
        setInterval(updateStatus, 5000);
        
        // 初始气泡
        setTimeout(showBubble, 1000);
    </script>
</body>
</html>
