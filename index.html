<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聆风的家 - 风崽的状态</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2d3748;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }
        #game-container {
            border: 4px solid #e94560;
            image-rendering: pixelated;
        }
        #status-text {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #eee;
            font-size: 14px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 4px;
            max-width: 90%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="status-text">风崽准备就绪</div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            pixelArt: true,
            scene: { preload: preload, create: create, update: update }
        };

        // 根据房间图调整的区域坐标
        // 房间图：左上是书房（电脑桌），左下是客厅（沙发），右上是厨房，右下是阳台
        const AREAS = {
            study: { x: 180, y: 280, name: '书房' },      // 左上 - 电脑桌
            livingroom: { x: 180, y: 480, name: '客厅' }, // 左下 - 沙发
            kitchen: { x: 580, y: 280, name: '厨房' },    // 右上 - 厨房
            balcony: { x: 650, y: 480, name: '阳台' }     // 右下 - 阳台
        };

        const STATES = [
            { key: 'idle', name: '待命', area: 'livingroom' },
            { key: 'writing', name: '整理文档', area: 'study' },
            { key: 'researching', name: '搜索信息', area: 'study' },
            { key: 'executing', name: '执行任务', area: 'study' },
            { key: 'syncing', name: '同步备份', area: 'kitchen' },
            { key: 'error', name: '出错了', area: 'livingroom' }
        ];

        const BUBBLE_TEXTS = {
            idle: ['等聆风吩咐…', '有什么任务？', '休息一会儿', '随时待命'],
            writing: ['这个要记下来', '整理资料中', '再检查一遍', '帮聆风写好'],
            researching: ['让我搜一下', '找到线索了', '这个有意思', '再深挖一点'],
            executing: ['冲鸭！', '这个简单', '马上搞定', '交给风崽吧'],
            syncing: ['备份备份', '安全第一', '同步中…', '云端见'],
            error: ['啊哦…', '出问题了', '让我看看', '马上修好']
        };

        let game, avatar, currentState = 'idle', statusText;
        let targetX = 180, targetY = 480;
        let bubble = null, lastBubble = 0;
        let lastBlink = 0;

        function preload() {
            this.load.image('home_bg', 'home_bg.jpg');
            this.load.image('avatar', 'avatar.png');
        }

        function create() {
            game = this;
            
            // 添加背景
            this.add.image(400, 300, 'home_bg');
            
            // 创建风崽角色
            avatar = this.add.sprite(180, 480, 'avatar');
            avatar.setOrigin(0.5);
            avatar.setScale(0.4);
            
            // 牌匾
            const plaqueBg = this.add.rectangle(400, 570, 300, 36, 0x5d4037);
            plaqueBg.setStrokeStyle(3, 0x3e2723);
            this.add.text(400, 570, '聆风的家', {
                font: '18px monospace',
                fill: '#ffd700',
                fontWeight: 'bold'
            }).setOrigin(0.5);
            
            // 区域标签
            Object.values(AREAS).forEach(area => {
                this.add.text(area.x, area.y - 40, area.name, {
                    font: '12px monospace',
                    fill: '#fff',
                    backgroundColor: '#000',
                    padding: { x: 4, y: 2 }
                }).setOrigin(0.5).setAlpha(0.7);
            });
            
            statusText = document.getElementById('status-text');
            updateStatusText();
            
            // 初始气泡
            showBubble();
        }

        function update(time) {
            // 随机切换状态（模拟）
            if (time % 10000 < 50) {
                const randomState = STATES[Math.floor(Math.random() * STATES.length)];
                currentState = randomState.key;
                const area = AREAS[randomState.area];
                targetX = area.x + (Math.random() - 0.5) * 60;
                targetY = area.y + (Math.random() - 0.5) * 40;
                updateStatusText();
            }
            
            // 移动
            const dx = targetX - avatar.x;
            const dy = targetY - avatar.y;
            const speed = 1.5;
            
            if (Math.abs(dx) > 2) avatar.x += Math.sign(dx) * speed;
            if (Math.abs(dy) > 2) avatar.y += Math.sign(dy) * speed;
            
            // 走动时的轻微上下摆动
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                avatar.y += Math.sin(time / 150) * 0.5;
            }
            
            // 眨眼效果
            if (time - lastBlink > 3000) {
                avatar.setScaleY(0.05);
                lastBlink = time;
                setTimeout(() => avatar.setScaleY(0.4), 120);
            }
            
            // 冒气泡
            if (time - lastBubble > 6000) {
                showBubble();
                lastBubble = time;
            }
        }

        function updateStatusText() {
            const state = STATES.find(s => s.key === currentState);
            const area = AREAS[state.area];
            statusText.textContent = `[${state.name}] 在${area.name} - 风崽工作中`;
        }

        function showBubble() {
            if (bubble) { bubble.destroy(); bubble = null; }
            
            const texts = BUBBLE_TEXTS[currentState] || BUBBLE_TEXTS.idle;
            const text = texts[Math.floor(Math.random() * texts.length)];
            
            const bg = game.add.rectangle(avatar.x, avatar.y - 50, text.length * 12 + 16, 26, 0xffffff, 0.95);
            bg.setStrokeStyle(2, 0x000000);
            
            const txt = game.add.text(avatar.x, avatar.y - 50, text, {
                font: '12px monospace',
                fill: '#000'
            }).setOrigin(0.5);
            
            bubble = game.add.container(0, 0, [bg, txt]);
            bubble.setDepth(100);
            
            setTimeout(() => {
                if (bubble) { bubble.destroy(); bubble = null; }
            }, 2500);
        }

        new Phaser.Game(config);
    </script>
</body>
</html>
